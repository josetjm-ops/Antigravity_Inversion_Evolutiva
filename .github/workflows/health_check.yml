name: "Health Check Diario"

"on":
  # ─────────────────────────────────────────────────────────────────────────
  # Schedule MIGRADO a cron-job.org (2026-05-26).
  # Cronjob equivalente: "0 8 * * 1-5" en zona America/Bogota.
  # Para rollback: descomentar el bloque schedule y deshabilitar el job
  # "GH Action - Health Check" en cron-job.org.
  # ─────────────────────────────────────────────────────────────────────────
  # schedule:
  #   - cron: "0 13 * * 1-5"   # 08:00 Bogotá (UTC-5)
  workflow_dispatch: {}

jobs:
  health:
    name: "Verificar dependencias críticas"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write

    env:
      DATABASE_URL:            ${{ secrets.DATABASE_URL }}
      DEEPSEEK_API_KEY:        ${{ secrets.DEEPSEEK_API_KEY }}
      FINNHUB_API_KEY:         ${{ secrets.FINNHUB_API_KEY }}
      # Umbral de aviso preventivo de saldo bajo en DeepSeek (USD).
      # El health check NO falla por saldo bajo; solo emite ⚠️ para avisar
      # con antelación antes de que el saldo llegue a cero y bloquee las
      # llamadas (incidente 2026-06-15: saldo agotado → HTTP 402).
      DEEPSEEK_LOW_BALANCE_USD: "2.0"
      LOG_LEVEL:               "INFO"

    steps:
      - name: "Checkout del repositorio"
        uses: actions/checkout@v6

      - name: "Configurar Python 3.11"
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: "Instalar dependencias"
        run: pip install -r requirements.txt

      - name: "Verificar secrets configurados"
        run: |
          MISSING=""
          [ -z "$DATABASE_URL" ]     && MISSING="$MISSING DATABASE_URL"
          [ -z "$DEEPSEEK_API_KEY" ] && MISSING="$MISSING DEEPSEEK_API_KEY"
          if [ -n "$MISSING" ]; then
            echo "❌ Secrets CRÍTICOS faltantes:$MISSING"
            echo "   Configura en: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ Secrets críticos OK: DATABASE_URL y DEEPSEEK_API_KEY configurados"
          if [ -z "$FINNHUB_API_KEY" ]; then
            echo "⚠️  FINNHUB_API_KEY no configurada — Sub-agente Macro operará sin datos de noticias"
          else
            echo "✅ FINNHUB_API_KEY configurada"
          fi

      - name: "Verificar conexión a base de datos (Supabase PostgreSQL)"
        run: |
          python -c "
          from db.connection import health_check
          ok = health_check()
          print('DB Supabase PostgreSQL:', '✅ OK' if ok else '❌ FAIL')
          exit(0 if ok else 1)
          "

      - name: "Verificar agentes activos en DB"
        run: |
          python -c "
          from db.connection import get_conn, get_dict_cursor
          with get_conn() as conn:
              cur = get_dict_cursor(conn)
              cur.execute(\"SELECT COUNT(*) as n FROM agentes WHERE estado='activo'\")
              n = cur.fetchone()['n']
              print(f'Agentes activos: {n}')
              if n == 0:
                  print('⚠️  Sin agentes activos — el Juez podría no haber corrido')
              else:
                  print(f'✅ {n} agentes listos para operar')
          "

      - name: "Verificar Yahoo Finance (fuente de precios EUR/USD)"
        run: |
          python -c "
          import requests
          try:
              r = requests.get(
                  'https://query1.finance.yahoo.com/v8/finance/chart/EURUSD=X',
                  headers={'User-Agent': 'Mozilla/5.0 (compatible; InversionEvolutiva/1.0)'},
                  params={'interval': '1m', 'range': '1d'},
                  timeout=10,
              )
              data = r.json()
              result = (data.get('chart') or {}).get('result') or []
              if result:
                  price = result[0]['meta']['regularMarketPrice']
                  print(f'✅ Yahoo Finance OK — EUR/USD = {price:.5f}')
              else:
                  print('⚠️  Yahoo Finance: resultado vacío (mercado cerrado o festivo) — se esperan HOLDs hoy')
          except Exception as e:
              print(f'❌ Yahoo Finance inaccesible: {e}')
              exit(1)
          "

      - name: "Verificar saldo de DeepSeek (cuota LLM)"
        # Preflight de facturación: consulta el saldo ANTES del ping de inferencia.
        # Falla con mensaje accionable si el saldo está agotado (is_available=false)
        # y emite un aviso preventivo ⚠️ cuando el saldo cae por debajo del umbral,
        # para recargar antes de que llegue a cero y bloquee a los agentes.
        run: |
          python -c "
          import os, sys, requests
          key = os.environ.get('DEEPSEEK_API_KEY', '')
          if not key:
              print('❌ DEEPSEEK_API_KEY no configurada')
              sys.exit(1)
          low = float(os.environ.get('DEEPSEEK_LOW_BALANCE_USD', '2.0'))
          try:
              resp = requests.get(
                  'https://api.deepseek.com/user/balance',
                  headers={'Authorization': 'Bearer ' + key},
                  timeout=10,
              )
          except Exception as e:
              print(f'⚠️  No se pudo consultar el saldo ({e}) — el ping de inferencia lo confirmará.')
              sys.exit(0)
          if resp.status_code != 200:
              print(f'⚠️  Endpoint de saldo respondió HTTP {resp.status_code} — el ping de inferencia lo confirmará.')
              sys.exit(0)
          data = resp.json()
          disponible = data.get('is_available', True)
          infos = data.get('balance_infos', []) or []
          info = next((b for b in infos if b.get('currency') == 'USD'), infos[0] if infos else {})
          total = info.get('total_balance', '?')
          cur = info.get('currency', '?')
          if not disponible:
              print(f'❌ SALDO AGOTADO en DeepSeek (is_available=false · saldo={total} {cur}).')
              print('   → Recarga en https://platform.deepseek.com/ (Top up / Recargar).')
              print('   Mientras tanto los agentes operan SOLO con heurística (sin validación del LLM).')
              sys.exit(1)
          try:
              if float(total) < low:
                  print(f'⚠️  SALDO BAJO en DeepSeek: {total} {cur} (umbral {low}). Recarga pronto: https://platform.deepseek.com/')
              else:
                  print(f'✅ Saldo DeepSeek OK: {total} {cur}')
          except (TypeError, ValueError):
              print(f'✅ Saldo DeepSeek: {total} {cur}')
          "

      - name: "Verificar DeepSeek API (LLM de los agentes)"
        run: |
          python -c "
          import os, sys
          from openai import OpenAI
          key = os.environ.get('DEEPSEEK_API_KEY', '')
          if not key:
              print('❌ DEEPSEEK_API_KEY no configurada')
              sys.exit(1)
          client = OpenAI(api_key=key, base_url='https://api.deepseek.com')
          try:
              r = client.chat.completions.create(
                  model='deepseek-chat',
                  messages=[{'role':'user','content':'ping'}],
                  max_tokens=5,
                  timeout=20.0,
              )
              print('✅ DeepSeek API OK (ping de inferencia exitoso)')
          except Exception as e:
              status = getattr(e, 'status_code', None)
              msg = str(e)
              if status == 402 or 'Insufficient Balance' in msg or '402' in msg:
                  print('❌ DeepSeek rechazó la llamada por SALDO INSUFICIENTE (HTTP 402).')
                  print('   → Recarga en https://platform.deepseek.com/ (Top up / Recargar).')
                  print('   Los agentes seguirán operando con heurística determinista hasta que recargues.')
              elif status in (401, 403):
                  print(f'❌ DeepSeek rechazó la API KEY (HTTP {status}). Revisa el secret DEEPSEEK_API_KEY.')
              else:
                  print(f'❌ DeepSeek API inaccesible o lenta (no es problema de saldo): {e}')
              sys.exit(1)
          "

      - name: "Verificar Finnhub API (noticias Forex — opcional)"
        run: |
          python -c "
          import os, requests, sys
          key = os.environ.get('FINNHUB_API_KEY','')
          if not key:
              print('⚠️  FINNHUB_API_KEY no configurada — omitiendo verificación')
              sys.exit(0)
          try:
              r = requests.get(
                  'https://finnhub.io/api/v1/news',
                  params={'category': 'forex', 'token': key},
                  timeout=10,
              )
              r.raise_for_status()
              n = len(r.json())
              print(f'✅ Finnhub API OK — {n} noticias forex disponibles')
          except Exception as e:
              print(f'❌ Finnhub API error: {e}')
              sys.exit(1)
          "

      - name: "Resumen del health check"
        if: success()
        run: |
          echo "============================================"
          echo "✅ TODOS LOS CHECKS PASARON"
          echo "Trading activo desde las 01:30 am Bogotá (06:30 UTC)"
          echo "============================================"

      - name: "🚨 Crear Issue de alerta si algún check falló"
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const date = new Date().toISOString().slice(0,10);
            const time = new Date().toISOString().slice(11,16);
            const title = `🚨 Health Check fallido — ${date}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });
            const duplicate = existing.data.find(i => i.title === title);

            if (duplicate) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `🔁 Falló de nuevo a las ${time} UTC — [ver logs](${runUrl})`,
              });
              console.log(`Comentario añadido al issue #${duplicate.number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: `## 🚨 Health Check Diario Fallido\n\n**Fecha:** ${date} a las ${time} UTC  \n**Logs:** [Ver workflow](${runUrl})\n\n### Qué revisar:\n- [ ] \`DATABASE_URL\` configurado en Secrets\n- [ ] \`DEEPSEEK_API_KEY\` configurado en Secrets\n- [ ] Supabase PostgreSQL accesible (https://supabase.com/dashboard)\n- [ ] Yahoo Finance responde\n- [ ] DeepSeek CON SALDO y respondiendo (https://platform.deepseek.com/) — causa más común (HTTP 402 Insufficient Balance)\n\n**El ciclo de trading de hoy puede estar afectado.**\n\n> Configura secrets en: **Settings → Secrets and variables → Actions**`,
              });
              console.log(`Issue creado: #${issue.data.number}`);
            }
