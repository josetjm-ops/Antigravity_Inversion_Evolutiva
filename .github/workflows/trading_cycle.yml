name: "Ciclo de Trading Diario"

"on":
  schedule:
    - cron: "50 13 * * 1-5"  # 08:50 Bogota (UTC-5) lunes a viernes — 10 min antes del trade_monitor
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (solo health check, no opera)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  trading:
    name: "Ejecutar pipeline de trading"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      issues: write

    env:
      DATABASE_URL:           ${{ secrets.DATABASE_URL }}
      DEEPSEEK_API_KEY:       ${{ secrets.DEEPSEEK_API_KEY }}
      ALPHA_VANTAGE_API_KEY:  ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      JUDGE_TIMEZONE:         "America/Bogota"
      LOG_LEVEL:              "INFO"
      ENVIRONMENT:            "production"

    steps:
      - name: "Checkout del repositorio"
        uses: actions/checkout@v4

      - name: "Configurar Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: "Instalar dependencias"
        run: pip install -r requirements.txt

      - name: "Health check - Base de datos"
        run: |
          python -c "
          from db.connection import health_check
          ok = health_check()
          print('DB health check:', 'PASS' if ok else 'FAIL')
          exit(0 if ok else 1)
          "

      - name: "Ejecutar ciclo de trading"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python -m cron.trading_runner --run-now

      - name: "Dry run - solo health checks"
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "Dry run activado - health checks completados exitosamente."
          python -c "
          from db.connection import get_conn, get_dict_cursor
          with get_conn() as conn:
              cur = get_dict_cursor(conn)
              cur.execute(\"SELECT COUNT(*) as n FROM agentes WHERE estado='activo'\")
              row = cur.fetchone()
              print(f'Agentes activos: {row[\"n\"]}')
          "

      - name: "Reportar resultado"
        if: always()
        run: echo "Ciclo de trading completado a las $(date -u +'%Y-%m-%d %H:%M UTC')"

      - name: "🚨 Crear Issue de alerta si el ciclo falló"
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0,10);
            const time = new Date().toISOString().slice(11,16);
            const title = `🚨 Ciclo de Trading fallido — ${date}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open',
            });
            const dup = existing.data.find(i => i.title === title);
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: dup.number,
                body: `🔁 Falló de nuevo a las ${time} UTC — [ver logs](${runUrl})`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: title,
                body: `## 🚨 Ciclo de Trading Fallido\n\n**Fecha:** ${date} a las ${time} UTC  \n**Logs:** [Ver workflow](${runUrl})\n\n### Posibles causas:\n- [ ] DB caída o sin conexión (Neon cold-start)\n- [ ] Yahoo Finance sin datos (mercado cerrado/festivo)\n- [ ] DeepSeek API caída o timeout\n- [ ] Error en código de los agentes\n\n**Los agentes NO operaron hoy.**`,
              });
            }
