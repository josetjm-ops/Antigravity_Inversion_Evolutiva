name: "Backfill Manual de Google Sheets"

"on":
  # ─────────────────────────────────────────────────────────────────────────
  # Schedule MIGRADO a cron-job.org (2026-05-26).
  # Cronjob equivalente: "0 1 * * 0" en zona America/Bogota (domingos 1 AM).
  # Para rollback: descomentar el bloque schedule y deshabilitar el job
  # "GH Action - Backfill Weekly" en cron-job.org.
  # ─────────────────────────────────────────────────────────────────────────
  # schedule:
  #   - cron: "0 6 * * 0"   # Domingos 06:00 UTC = 1:00 am Bogotá (safety-net semanal)
  workflow_dispatch:
    inputs:
      motivo:
        description: "Motivo del backfill (opcional)"
        required: false
        default: "sincronizacion manual"

jobs:
  backfill:
    name: "Sincronizar DB hacia Google Sheets"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL:             ${{ secrets.DATABASE_URL }}
      GOOGLE_SHEET_ID:          ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_CREDENTIALS_JSON:  ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

    steps:
      - name: "Checkout del repositorio"
        uses: actions/checkout@v4

      - name: "Configurar Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: "Instalar dependencias"
        run: pip install -r requirements.txt

      - name: "Diagnostico previo"
        run: python utils/diagnose_backfill.py

      - name: "Ejecutar backfill"
        run: python -m utils.sheets_backfill

      - name: "Confirmar resultado"
        if: always()
        run: echo "Backfill completado a las $(date -u +'%Y-%m-%d %H:%M UTC')"
