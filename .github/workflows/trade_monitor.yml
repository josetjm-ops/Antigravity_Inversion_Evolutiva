name: "Monitor de Trades (SL/TP + Nuevas Posiciones)"

# ─────────────────────────────────────────────────────────────────────────
# Horarios (Bogotá UTC-5 / cron en UTC):
#   - Apertura de nuevas posiciones: 1:30 am – 11:00 pm Bogotá
#                                     (06:30 UTC – 04:00 UTC siguiente día)
#   - Vigilancia de SL/TP / trailing: cada 15 min desde 1:30 am hasta 10:30 pm
#     Bogotá (último monitor antes del cierre forzoso del Juez a las 10:45 pm).
#   - En la práctica el último monitor con poder de abrir corre a las 10:30 pm
#     Bogotá; entre 10:30 pm y 11:00 pm el monitor no se vuelve a disparar y
#     a las 10:45 pm el cierre forzoso del Juez liquida todo lo abierto.
#
# El cron en UTC necesita cubrir un rango que cruza la medianoche UTC:
#   Día Bogotá: Lun  1:30am – Lun 10:30pm
#   Día UTC:    Lun  06:30  – Mar 03:30   (siguiente día UTC)
#
# Por eso se usan cuatro entradas de cron coordinadas (Mon-Fri Bogotá):
#   06:30 y 06:45 UTC  → 1:30 am y 1:45 am Bogotá (mismo día)
#   07:00 – 23:45 UTC  → 2:00 am – 6:45 pm Bogotá (mismo día)
#   00:00 – 02:45 UTC  → 7:00 pm – 9:45 pm Bogotá (día anterior)
#   03:00, 03:15, 03:30 UTC → 10:00 pm, 10:15 pm, 10:30 pm Bogotá (día anterior)
#
# El último monitor programado cierra a las 03:30 UTC para no chocar con
# el cierre forzoso del Juez a las 03:45 UTC (judge_daily.yml).
#
# VENTANA CIEGA cubierta con "*/15 4-6 * * 2-6" (11:00 pm – 1:45 am Bogotá):
# si judge_daily se retrasa, la guardia EOD en trade_monitor.py cierra
# posiciones del día anterior en el primer ciclo que detecte.
# ─────────────────────────────────────────────────────────────────────────

"on":
  # ─────────────────────────────────────────────────────────────────────────
  # Schedule MIGRADO a cron-job.org (2026-05-26) — disparador externo
  # confiable porque GitHub Actions cron puede retrasarse horas.
  # Cronjob equivalente: "*/15 * * * 1-5" en zona America/Bogota.
  # Para rollback: descomentar el bloque schedule de abajo y deshabilitar
  # el job "GH Action - Trade Monitor" en cron-job.org.
  # ─────────────────────────────────────────────────────────────────────────
  # schedule:
  #   - cron: "30,45 6 * * 1-5"      # 1:30 am y 1:45 am Bogotá (Mon-Fri Bogotá)
  #   - cron: "*/15 7-23 * * 1-5"    # 2:00 am – 6:45 pm Bogotá (Mon-Fri Bogotá)
  #   - cron: "*/15 0-2 * * 2-6"     # 7:00 pm – 9:45 pm Bogotá (Mon-Fri Bogotá)
  #   - cron: "0,15,30 3 * * 2-6"    # 10:00 pm, 10:15 pm, 10:30 pm Bogotá (Mon-Fri Bogotá)
  #   - cron: "*/15 4-6 * * 2-6"     # ventana ciega EOD: 11:00 pm – 1:45 am Bogotá
  workflow_dispatch: {}             # disparo desde cron-job.org y manual

jobs:
  monitor:
    name: "SL/TP + evaluar nuevas posiciones"
    runs-on: ubuntu-latest
    # 12 min: cuando deepseek-reasoner se pone lento (~30-35s/agente) los 10
    # agentes + setup + verificación SL/TP no caben en 5 min y el job se cancela
    # a la mitad (caso 2026-05-28 11:15 UTC: solo 6 de 10 agentes evaluados).
    # 12 min da holgura y sigue por debajo de la cadencia de 15 min (sin solape).
    timeout-minutes: 12
    permissions:
      issues: write

    env:
      DATABASE_URL:             ${{ secrets.DATABASE_URL }}
      DEEPSEEK_API_KEY:         ${{ secrets.DEEPSEEK_API_KEY }}
      FINNHUB_API_KEY:          ${{ secrets.FINNHUB_API_KEY }}
      ALPHA_VANTAGE_API_KEY:    ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      GOOGLE_SHEET_ID:          ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_CREDENTIALS_JSON:  ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      # Horario de apertura (UTC, formato HH:MM)
      # 06:30 UTC – 04:00 UTC (siguiente día UTC) = 1:30 am – 11:00 pm Bogotá.
      # La ventana cruza la medianoche UTC; _within_trading_hours() lo maneja.
      TRADING_START_TIME_UTC:   "06:30"
      TRADING_CUTOFF_TIME_UTC:  "04:00"
      LOG_LEVEL:                "INFO"
      ENVIRONMENT:              "production"

    steps:
      - name: "Checkout del repositorio"
        uses: actions/checkout@v6

      - name: "Configurar Python 3.11"
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: "Instalar dependencias"
        run: pip install -r requirements.txt

      - name: "Verificar SL/TP + evaluar nuevas posiciones"
        run: python -m cron.trade_monitor --run-once

      - name: "Reportar resultado"
        if: always()
        run: echo "Monitor ejecutado a las $(date -u +'%Y-%m-%d %H:%M UTC')"

      - name: "🚨 Crear Issue de alerta si el monitor falló"
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0,10);
            const time = new Date().toISOString().slice(11,16);
            const title = `🚨 Trade Monitor fallido — ${date}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open',
            });
            const dup = existing.data.find(i => i.title === title);
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: dup.number,
                body: `🔁 Falló de nuevo a las ${time} UTC — [ver logs](${runUrl})`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: title,
                body: `## 🚨 Trade Monitor Fallido\n\n**Fecha:** ${date} a las ${time} UTC  \n**Logs:** [Ver workflow](${runUrl})\n\n⚠️ **Las posiciones abiertas NO están siendo vigiladas.** SL/TP pueden no ejecutarse.\n\n### Posibles causas:\n- [ ] DB caída (Neon cold-start prolongado)\n- [ ] Yahoo Finance sin precio actual\n- [ ] Error en cron/trade_monitor.py`,
              });
            }
