name: "Monitor de Trades (SL/TP + Nuevas Posiciones)"

"on":
  schedule:
    - cron: "*/15 8-22 * * 1-5"   # cada 15 min, 8:00-22:00 UTC, lunes a viernes
  workflow_dispatch: {}             # disparo manual para pruebas

jobs:
  monitor:
    name: "SL/TP + evaluar nuevas posiciones"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write

    env:
      DATABASE_URL:      ${{ secrets.DATABASE_URL }}
      DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
      FINNHUB_API_KEY:   ${{ secrets.FINNHUB_API_KEY }}
      LOG_LEVEL:         "INFO"
      ENVIRONMENT:       "production"

    steps:
      - name: "Checkout del repositorio"
        uses: actions/checkout@v4

      - name: "Configurar Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: "Instalar dependencias"
        run: pip install -r requirements.txt

      - name: "Verificar SL/TP + evaluar nuevas posiciones"
        run: python -m cron.trade_monitor --run-once

      - name: "Reportar resultado"
        if: always()
        run: echo "Monitor ejecutado a las $(date -u +'%Y-%m-%d %H:%M UTC')"

      - name: "🚨 Crear Issue de alerta si el monitor falló"
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0,10);
            const time = new Date().toISOString().slice(11,16);
            const title = `🚨 Trade Monitor fallido — ${date}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open',
            });
            const dup = existing.data.find(i => i.title === title);
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: dup.number,
                body: `🔁 Falló de nuevo a las ${time} UTC — [ver logs](${runUrl})`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: title,
                body: `## 🚨 Trade Monitor Fallido\n\n**Fecha:** ${date} a las ${time} UTC  \n**Logs:** [Ver workflow](${runUrl})\n\n⚠️ **Las posiciones abiertas NO están siendo vigiladas.** SL/TP pueden no ejecutarse.\n\n### Posibles causas:\n- [ ] DB caída (Neon cold-start prolongado)\n- [ ] Yahoo Finance sin precio actual\n- [ ] Error en cron/trade_monitor.py`,
              });
            }
