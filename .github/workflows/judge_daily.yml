name: "Agente Juez - Ciclo Evolutivo Diario"

# ─────────────────────────────────────────────────────────────────────────
# Horario (Bogotá UTC-5 / cron en UTC):
#   - Cierre forzoso EOD (force-close-all): 10:45 pm Bogotá = 03:45 UTC
#   - Ciclo evolutivo del Juez:             11:00 pm Bogotá = 04:00 UTC
#
# El workflow se dispara a las 03:45 UTC (10:45 pm Bogotá). Primero ejecuta
# el cierre forzoso, luego espera 15 minutos para que el Juez arranque
# exactamente a las 04:00 UTC (11:00 pm Bogotá) — esto deja un buffer de
# seguridad por si el cierre forzoso tarda o se reintenta.
#
# El día UTC corresponde al día siguiente de Bogotá: el cron 03:45 UTC
# Martes-Sábado equivale a 10:45 pm Lunes-Viernes Bogotá.
# ─────────────────────────────────────────────────────────────────────────

"on":
  # ─────────────────────────────────────────────────────────────────────────
  # Schedule MIGRADO a cron-job.org (2026-05-26) — el cron interno de GH
  # Actions retrasó este workflow ~8h el 2026-05-25, ejecutando force-close
  # durante trading hours. Cronjob equivalente: "45 22 * * 1-5" en
  # America/Bogota.
  # Para rollback: descomentar el bloque schedule y deshabilitar el job
  # "GH Action - Judge Daily" en cron-job.org.
  # La guardia de ventana segura abajo queda como defensa adicional si
  # algún día se reactiva el schedule de GitHub.
  # ─────────────────────────────────────────────────────────────────────────
  # schedule:
  #   - cron: "45 3 * * 2-6"   # 10:45 pm Bogotá (Mon-Fri Bogotá → Tue-Sat UTC)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (solo verifica DB, no ejecuta ciclo)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

jobs:
  ciclo-evolutivo:
    name: "Ejecutar ciclo evolutivo"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      issues: write

    env:
      DATABASE_URL:                ${{ secrets.DATABASE_URL }}
      DEEPSEEK_API_KEY:            ${{ secrets.DEEPSEEK_API_KEY }}
      FINNHUB_API_KEY:             ${{ secrets.FINNHUB_API_KEY }}
      ALPHA_VANTAGE_API_KEY:       ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      GOOGLE_SHEET_ID:             ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_CREDENTIALS_JSON:     ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      JUDGE_TIMEZONE:              "America/Bogota"
      JUDGE_RUN_TIME:              "23:00"
      AGENTS_ELIMINATE_PER_CYCLE:  "9"   # 3 por especie × 3 especies
      MUTATION_SIGMA_WEIGHTS:      "0.05"
      MUTATION_SIGMA_PERIODS:      "0.08"
      MUTATION_SIGMA_RISK:         "0.10"
      MIN_ROI_FOR_HALL_OF_FAME:    "0.05"
      # ── Sesión 7: Periodo de Gracia + Cuota Dinámica + Diversidad ────────
      # Días HÁBILES (lun-vie) de inmunidad para agentes recién nacidos sin operaciones.
      GRACE_PERIOD_DAYS:           "2"
      # Umbral de coeficiente de variación del ADN; por debajo de este valor
      # las sigmas de mutación se multiplican por SIGMA_BOOST_FACTOR.
      DIVERSITY_VARIANCE_THRESHOLD: "0.01"
      SIGMA_BOOST_FACTOR:          "2.0"
      # ── Sesión 17: Torneo con umbral OOS + Inmunidad revocable + Híbrido + Ruptura ─
      # Fitness OOS estrictamente mayor para desplegar hijo. 0.0 = solo positivos pasan.
      TOURNAMENT_MIN_OOS_FITNESS:  "0.0"
      TOURNAMENT_MIN_OOS_TRADES:   "5"
      # Revoca inmunidad por muestra si roi_total <= -IMMUNITY_MAX_LOSS_PCT %
      IMMUNITY_MAX_LOSS_PCT:       "8.0"
      # Elegible si trades >= MIN o edad_dias_habiles >= MIN_SAMPLE_DAYS
      MIN_SAMPLE_DAYS:             "7"
      # Bloquear especie ruptura en régimen RANGO (coherencia backtest ↔ prod)
      RUPTURA_SOLO_TENDENCIA:      "true"
      LOG_LEVEL:                   "INFO"
      ENVIRONMENT:                 "production"

    steps:
      - name: "Verificar ventana de ejecución segura (solo runs programados)"
        # Si GitHub Actions retrasa el cron horas, este guard aborta antes de que
        # el force-close-all se ejecute durante el horario activo de trading.
        # Ventana segura: 02:00–06:00 UTC = 09:00 pm–01:00 am Bogotá.
        # El trading abre a las 06:30 UTC; cualquier ejecución >= 06:00 UTC
        # podría interferir con posiciones activas.
        # workflow_dispatch omite esta guardia para permitir recuperación manual.
        if: ${{ github.event_name == 'schedule' && github.event.inputs.dry_run != 'true' }}
        run: |
          HOUR=$(date -u +'%-H')
          MINUTE=$(date -u +'%-M')
          CURRENT_MIN=$(( HOUR * 60 + MINUTE ))
          WINDOW_START_MIN=$(( 2 * 60 ))   # 02:00 UTC = 120 min
          WINDOW_END_MIN=$(( 6 * 60 ))     # 06:00 UTC = 360 min (30 min antes del trading)
          echo "Hora actual: $(date -u +'%H:%M UTC') — minuto del día: ${CURRENT_MIN}"
          echo "Ventana segura: 02:00–06:00 UTC (09:00 pm–01:00 am Bogotá)"
          if [ "${CURRENT_MIN}" -lt "${WINDOW_START_MIN}" ] || [ "${CURRENT_MIN}" -ge "${WINDOW_END_MIN}" ]; then
            echo ""
            echo "❌ ABORT: el Juez está corriendo FUERA de su ventana segura."
            echo "   Hora actual:     $(date -u +'%H:%M UTC') (Bogotá: $(TZ=America/Bogota date +'%H:%M'))"
            echo "   Ventana segura:  02:00–06:00 UTC (09:00 pm–01:00 am Bogotá)"
            echo "   Programado para: 03:45 UTC (10:45 pm Bogotá)"
            echo ""
            echo "   Diagnóstico: retraso grave en el cron de GitHub Actions."
            echo "   Ejecutar force-close-all ahora interrumpiría el trading activo."
            echo "   Usa 'workflow_dispatch' para lanzar el ciclo manualmente."
            exit 1
          fi
          echo "✅ Dentro de ventana segura — continuando con el ciclo evolutivo."

      - name: "Checkout del repositorio"
        uses: actions/checkout@v6

      - name: "Configurar Python 3.11"
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: "Instalar dependencias"
        run: pip install -r requirements.txt

      - name: "Cierre intraday EOD - cerrar todas las posiciones abiertas (10:45 pm Bogotá)"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          echo "[$(date -u +'%H:%M UTC')] Cerrando posiciones abiertas antes de la evaluacion del Juez..."
          python -m cron.trade_monitor --force-close-all

      - name: "Espera 15 minutos hasta las 11:00 pm Bogotá"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          echo "[$(date -u +'%H:%M UTC')] Esperando 15 minutos para que el Juez arranque a las 04:00 UTC (11:00 pm Bogotá)..."
          sleep 900
          echo "[$(date -u +'%H:%M UTC')] Espera completada."

      - name: "Health check de la base de datos"
        run: |
          python -c "
          from db.connection import health_check
          ok = health_check()
          print('DB health check:', 'PASS' if ok else 'FAIL')
          exit(0 if ok else 1)
          "

      - name: "Ejecutar ciclo evolutivo (Agente Juez)"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python -m cron.judge_scheduler --run-now

      - name: "Dry run - solo health check"
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "Dry run activado."
          python -c "
          from evolution.evolution_engine import EvolutionEngine
          from datetime import date
          engine = EvolutionEngine(date.today())
          agents = engine._get_active_agents_ranked()
          print(f'Agentes activos: {len(agents)}')
          for a in agents[:3]:
              print(f'  {a[\"id\"]} | ROI={a[\"roi_total\"]}')
          "

      - name: "Reportar resultado"
        if: always()
        run: echo "Ciclo completado a las $(date -u +'%Y-%m-%d %H:%M UTC')"

      - name: "🚨 Crear Issue de alerta si el Juez falló"
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0,10);
            const time = new Date().toISOString().slice(11,16);
            const title = `🚨 Agente Juez fallido — ${date}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open',
            });
            const dup = existing.data.find(i => i.title === title);
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: dup.number,
                body: `🔁 Falló de nuevo a las ${time} UTC — [ver logs](${runUrl})`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: title,
                body: `## 🚨 Agente Juez Fallido\n\n**Fecha:** ${date} a las ${time} UTC  \n**Logs:** [Ver workflow](${runUrl})\n\n⚠️ **La evolución genética de hoy no ocurrió.** Los agentes no fueron evaluados ni se generó la siguiente generación.\n\n### Posibles causas:\n- [ ] DB caída durante el ciclo evolutivo\n- [ ] DeepSeek API no respondió al Juez\n- [ ] Error en evolution/evolution_engine.py\n- [ ] Posiciones no se cerraron al EOD`,
              });
            }
