name: "Backfill Google Sheets (run)"

on:
  push:
    branches: [master]
    paths: [".github/workflows/backfill_run.yml"]

jobs:
  backfill:
    name: "Sincronizar DB → Google Sheets"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL:             ${{ secrets.DATABASE_URL }}
      DEEPSEEK_API_KEY:         ${{ secrets.DEEPSEEK_API_KEY }}
      FINNHUB_API_KEY:          ${{ secrets.FINNHUB_API_KEY }}
      ALPHA_VANTAGE_API_KEY:    ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      GOOGLE_SHEET_ID:          ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_CREDENTIALS_JSON:  ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

    steps:
      - name: "Checkout del repositorio"
        uses: actions/checkout@v4

      - name: "Configurar Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: "Instalar dependencias"
        run: pip install -r requirements.txt

      - name: "Diagnostico de secretos y conexion"
        run: |
          python -c "
          import os, json, sys, traceback

          sid   = os.getenv('GOOGLE_SHEET_ID','')
          creds = os.getenv('GOOGLE_CREDENTIALS_JSON','')
          db    = os.getenv('DATABASE_URL','')

          print(f'GOOGLE_SHEET_ID: {\"SET (len={len(sid)})\" if sid else \"EMPTY\"}')
          print(f'GOOGLE_CREDENTIALS_JSON: {\"SET (len={len(creds)})\" if creds else \"EMPTY\"}')
          print(f'DATABASE_URL: {\"SET (len={len(db)})\" if db else \"EMPTY\"}')

          # -- Validar JSON de credenciales --
          if creds:
              try:
                  info = json.loads(creds)
                  print(f'Credentials JSON valido: type={info.get(\"type\")}, project={info.get(\"project_id\",\"?\")}, email={info.get(\"client_email\",\"?\")[:30]}')
              except Exception as e:
                  print(f'Credentials JSON INVALIDO: {e}')
                  sys.exit(1)

          # -- Probar conexion a Google Sheets --
          if sid and creds:
              try:
                  import gspread
                  info = json.loads(creds)
                  scopes = ['https://www.googleapis.com/auth/spreadsheets','https://www.googleapis.com/auth/drive']
                  client = gspread.service_account_from_dict(info, scopes=scopes)
                  sh = client.open_by_key(sid)
                  print(f'Sheets conexion OK: titulo=\"{sh.title}\"')
                  ws_names = [ws.title for ws in sh.worksheets()]
                  print(f'Pestanas: {ws_names}')
              except Exception as e:
                  print(f'ERROR conectando a Sheets: {type(e).__name__}: {e}')
                  traceback.print_exc()
                  sys.exit(1)
          else:
              print('SKIP: Sheets no configurado')
              sys.exit(1)

          # -- Probar conexion a PostgreSQL --
          if not db:
              print('ERROR: DATABASE_URL esta vacio — no se puede conectar a la DB')
              sys.exit(1)
          try:
              import psycopg2
              conn = psycopg2.connect(db, connect_timeout=10)
              cur = conn.cursor()
              cur.execute('SELECT COUNT(*) FROM agentes')
              n_agentes = cur.fetchone()[0]
              cur.execute('SELECT COUNT(*) FROM operaciones')
              n_ops = cur.fetchone()[0]
              conn.close()
              print(f'DB conexion OK: agentes={n_agentes}, operaciones={n_ops}')
          except Exception as e:
              print(f'ERROR conectando a DB: {type(e).__name__}: {e}')
              traceback.print_exc()
              sys.exit(1)
          "

      - name: "Ejecutar backfill"
        run: |
          python -c "
          import traceback, sys, logging
          logging.basicConfig(level=logging.DEBUG, format='%(levelname)s %(name)s %(message)s')
          try:
              from utils.sheets_backfill import run_backfill
              run_backfill()
          except SystemExit as e:
              print(f'sys.exit({e.code}) llamado — revisar logs anteriores')
              sys.exit(int(e.code) if e.code is not None else 1)
          except Exception as e:
              print(f'EXCEPCION NO CAPTURADA: {type(e).__name__}: {e}')
              traceback.print_exc()
              sys.exit(1)
          "

      - name: "Confirmar resultado"
        if: always()
        run: echo "Backfill completado a las $(date -u +'%Y-%m-%d %H:%M UTC')"
